name: Deploy to Netlify

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm (use version from package.json)
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Install minifiers
        run: pnpm add -D html-minifier-terser terser lightningcss-cli

      - name: Minify HTML / JS / CSS
        run: |
          npx html-minifier-terser \
            --input-dir dist \
            --output-dir dist \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --minify-css true \
            --minify-js true \
            --file-ext html

          find dist -name "*.js" -type f -exec npx terser {} -o {} --compress --mangle \;
          find dist -name "*.css" -type f -exec npx lightningcss {} -o {} --minify \;


      # ------------------------------
      # 🔥 部署
      # ------------------------------

      - name: Install Netlify CLI
        run: npm install --global netlify-cli@latest

      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=${{ secrets.NETLIFY_SITE_ID }}
