name: Build and Deploy to pages branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Install minifiers
        run: pnpm add -D html-minifier-terser terser lightningcss-cli

      - name: Minify HTML
        run: |
          npx html-minifier-terser \
            --input-dir dist \
            --output-dir dist \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --file-ext html

      - name: Minify JS
        run: |
          find dist -name "*.js" -type f -exec npx terser {} -o {} --compress --mangle \;

      - name: Minify CSS
        run: |
          find dist -name "*.css" -type f -exec npx lightningcss {} -o {} --minify \;

      - name: Initialize pages branch
        run: |
          cp -r dist /tmp/pages
          cd /tmp/pages
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b pages
          git add .
          git commit -m "Build and Deploy from Github Actions"

      - name: Force push to pages branch
        run: |
          cd /tmp/pages
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push -f origin pages